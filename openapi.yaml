openapi: 3.1.0
info:
  title: Paxeer Portfolio API
  version: 0.3.0
  description: |
    Complete REST API for the Paxeer Portfolio Service.
    Provides unified wallet portfolio tracking across on-chain and off-chain systems:
    token metadata, perpetuals positions, PnL analytics, chart data, AMM DEX data,
    off-chain exchange balances/trades, rewards/points/airdrops, leaderboard,
    trading performance, user profiles, asset price charts, and trending tokens.
    
    ## Data Sources (13 databases)
    - **Paxscan**: Block explorer data (tokens, balances, transactions)
    - **Portfolio**: Enriched data store (prices, snapshots, PnL)
    - **Price Oracle**: PAX price candles and tick prices
    - **DEX Subgraph**: Launchpad token markets, swaps, trending scores
    - **Perps**: Perpetuals positions, trades, vaults, markets
    - **Argus**: Centurion scores, performance metrics, behavioral analysis
    - **Auth**: User identity and fund status
    - **Candles A**: PAX component asset candles (20 crypto assets)
    - **Candles B**: Multi-asset candles (crypto + stocks/commodities)
    - **AMM Subgraph**: Uniswap V2-style pair/swap/mint/burn data
    - **TokenStats**: Authoritative price source for WPAX/PAX
    - **Exchange**: Off-chain orderbook (balances, orders, trades, deposits, withdrawals)
    - **Rewards**: Points, tiers, quests, airdrops, referrals, leaderboard
  contact:
    name: Paxeer Team
  license:
    name: MIT

servers:
  - url: https://us-east-1.user-stats.sidiora.exchange
    description: Production

tags:
  - name: Health
    description: Service health and status
  - name: Tokens
    description: Token metadata and sync operations
  - name: Prices
    description: Token price sync operations
  - name: Portfolio
    description: Wallet portfolio data
  - name: PnL
    description: Profit & Loss and balance tracking
  - name: Portfolio Charts
    description: Time-series chart data for portfolio metrics
  - name: Perps
    description: Perpetuals trading positions and trades
  - name: Enrichment
    description: "Phase 2: Leaderboard rank, trading performance, user profile"
  - name: Asset Charts
    description: "Phase 3: OHLCV price charts for any asset (PAX, BTC, ETH, stocks, etc.)"
  - name: DEX
    description: "Phase 3: Trending launchpad tokens and DEX swap history"
  - name: AMM
    description: "Phase 4: Uniswap V2-style AMM pairs, swaps, mints, burns, analytics"
  - name: Exchange
    description: "Phase 6: Off-chain orderbook exchange (balances, orders, trades, deposits, withdrawals)"
  - name: Rewards
    description: "Phase 7: Points, tiers, quests, airdrops, referrals, leaderboard"

paths:
  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Service health check
      description: Returns service status and version. Use for uptime monitoring and readiness probes.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "0.1.0"

  /api/v1/tokens:
    get:
      operationId: listTokens
      tags: [Tokens]
      summary: List all tokens (summary)
      description: Returns a summary of all tracked tokens with metadata completeness stats.
      responses:
        "200":
          description: Token summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSummary"
              example:
                total: 203
                complete_basic: 192
                with_icon: 68
                with_price: 90
                erc20_count: 197
                erc721_count: 6
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/tokens/audit:
    get:
      operationId: auditTokens
      tags: [Tokens]
      summary: Audit token metadata completeness
      description: |
        Returns detailed audit of token metadata quality including counts by type,
        completeness metrics, and a sample of tokens needing enrichment.
      responses:
        "200":
          description: Token audit report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenAuditReport"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/tokens/sync:
    post:
      operationId: syncTokens
      tags: [Tokens]
      summary: Trigger token metadata sync from Paxscan
      description: |
        Manually triggers a full sync of token metadata from the Paxscan block explorer database.
        This runs automatically every 5 minutes but can be triggered on-demand.
      responses:
        "200":
          description: Sync completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSyncReport"
              example:
                success: true
                total: 203
                complete: 192
                partial: 11
                missing: 0
                with_icon: 68
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/tokens/{address}:
    get:
      operationId: getToken
      tags: [Tokens]
      summary: Get single token metadata
      description: Returns metadata for a specific token by its contract address.
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/prices/sync:
    post:
      operationId: syncPrices
      tags: [Prices]
      summary: Trigger price sync from all DB sources
      description: |
        Manually triggers a full price sync from:
        - **Price Oracle DB**: PAX native price (candle close)
        - **DEX Subgraph DB**: All DEX market spot prices
        - **Hardcoded**: Stablecoin prices fixed at $1.00
        
        Prices are stored in the Portfolio DB and used for portfolio valuations.
        This runs automatically every 30 seconds.
      responses:
        "200":
          description: Price sync completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSyncReport"
              example:
                success: true
                total_tokens: 90
                updated: 90
                by_source:
                  network: 86
                  stablecoin: 4
                native_pax_price: "10.8558331254187000"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}:
    get:
      operationId: getPortfolio
      tags: [Portfolio]
      summary: Get full portfolio for a wallet
      description: |
        Returns the complete portfolio for a wallet address including:
        - Native PAX balance with USD value
        - All ERC-20 token holdings with prices
        - Perpetuals portfolio summary (vault, positions, PnL)
        - Total portfolio value in USD
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Complete portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/holdings:
    get:
      operationId: getHoldings
      tags: [Portfolio]
      summary: Get token holdings for a wallet
      description: Returns all ERC-20 token holdings with balances, prices, and USD values.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Token holdings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenHolding"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/transactions:
    get:
      operationId: getTransactions
      tags: [Portfolio]
      summary: Get transactions for a wallet
      description: |
        Returns enriched transaction history with type classification,
        token transfer details, gas costs, and USD values. Supports pagination.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: limit
          in: query
          description: Maximum number of transactions to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of transactions to skip for pagination
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrichedTransaction"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/balance:
    get:
      operationId: getBalance
      tags: [PnL]
      summary: Get total balance with daily PnL
      description: |
        Returns the current total portfolio balance broken down by native, tokens,
        and perps, plus the daily PnL compared to yesterday's snapshot.
        Also saves a daily snapshot for historical tracking.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Balance with PnL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/pnl:
    get:
      operationId: getPnlHistory
      tags: [PnL]
      summary: Get PnL history
      description: |
        Returns daily PnL history showing portfolio value changes over time.
        Each entry includes total value, component breakdown, and daily change.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: days
          in: query
          description: Number of days of history (max 365)
          schema:
            type: integer
            default: 30
            maximum: 365
      responses:
        "200":
          description: PnL history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlHistoryResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/value:
    get:
      operationId: getPortfolioValueChart
      tags: [Portfolio Charts]
      summary: Portfolio value chart
      description: |
        Returns time-series data for portfolio total value.
        Uses high-frequency snapshots (5min intervals) when available, falls back to daily.
        
        **Granularity by period:**
        - `1d` → every 5 min
        - `7d` → every 1 hour
        - `30d` → every 4 hours
        - `90d` → every day
        - `1y` → every day
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/pnl:
    get:
      operationId: getPnlChart
      tags: [Portfolio Charts]
      summary: PnL chart
      description: Returns time-series PnL data (change between consecutive snapshots).
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/holdings:
    get:
      operationId: getHoldingsChart
      tags: [Portfolio Charts]
      summary: Holdings count chart
      description: Returns time-series data for the number of unique tokens held.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/tx-volume:
    get:
      operationId: getTxVolumeChart
      tags: [Portfolio Charts]
      summary: Transaction volume chart
      description: Returns time-series data for transaction volume in USD.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/perps:
    get:
      operationId: getPerpsPortfolio
      tags: [Perps]
      summary: Get perps portfolio summary
      description: |
        Returns the complete perpetuals portfolio for a user including:
        - Vault status and address
        - All open positions with unrealized PnL
        - Total collateral, unrealized/realized PnL
        - Aggregated user stats (position counts, trade counts, orders)
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Perps portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerpsPortfolioSummary"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/perps/positions:
    get:
      operationId: getPerpsPositions
      tags: [Perps]
      summary: Get perps positions
      description: |
        Returns perpetuals positions for a user. Can filter by status and paginate.
        Each position includes market info, entry/current price, leverage, and PnL.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: status
          in: query
          description: Filter by position status
          schema:
            type: string
            enum: [open, closed, liquidated]
        - name: limit
          in: query
          description: Maximum results (max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Positions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerpsPosition"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/perps/trades:
    get:
      operationId: getPerPsTrades
      tags: [Perps]
      summary: Get perps trade history
      description: Returns perpetuals trade history for a user with pagination.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: limit
          in: query
          description: Maximum results (max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerpsTrade"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Phase 2: Enrichment endpoints ──────────────────────────────────────

  /api/v1/{address}/rank:
    get:
      operationId: getUserRank
      tags: [Enrichment]
      summary: Get user's leaderboard rank and centurion score
      description: |
        Returns the user's Coliseum leaderboard position, centurion score breakdown
        (performance, risk, behavioral), rank tier, and percentile.
        Data comes from the Argus gamification database.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: User rank data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRank"
              example:
                address: "0xf263ab36de550bda08b52d43eb253b3c0387e2bc"
                total_score: 367.2
                performance_score: 56.66
                risk_score: 578.43
                behavioral_score: 568.33
                rank: PLEBEIAN
                percentile: 5.13
                leaderboard_position: 36
                season_id: "87289761-81f9-4309-8ebd-555dc40e199f"
                calculated_at: "2026-02-19 03:34:14.206"
                is_qualified: true
        "503":
          description: Argus DB not configured
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/{address}/performance:
    get:
      operationId: getUserPerformance
      tags: [Enrichment]
      summary: Get user's trading performance metrics
      description: |
        Returns detailed trading performance including ROI, Sharpe ratio, win rate,
        profit factor, total PnL, and behavioral analysis (diversification,
        position sizing, trading frequency, etc.).
        Data comes from the Argus gamification database.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: User performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPerformance"
              example:
                address: "0xf263ab36de550bda08b52d43eb253b3c0387e2bc"
                season_id: "87289761-81f9-4309-8ebd-555dc40e199f"
                roi: -17686421.92
                roi_percent: -63.21
                sharpe_ratio: -0.678
                win_rate: 0.0
                total_trades: 131
                winning_trades: 0
                losing_trades: 0
                profit_factor: 0.0
                total_pnl: "-17686421.92304366"
                calculated_at: "2026-02-19 03:34:14.097"
                behavioral:
                  diversification_score: 83.33
                  trading_frequency: 131.0
                  unique_tokens_traded: 17
        "503":
          description: Argus DB not configured
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/{address}/profile:
    get:
      operationId: getUserProfile
      tags: [Enrichment]
      summary: Get user profile (identity + fund status)
      description: |
        Returns the user's identity (name, email), funding status, and fund
        transaction hashes. Read-only access to the Auth database.
        **Security note**: Never exposes private keys or password hashes.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
              example:
                address: "0xf263aB36de550bDa08b52d43eB253b3C0387e2bc"
                first_name: Andrew
                last_name: Garcell
                email: marksbenjamin256@gmail.com
                funded: true
                fund_status: funded
                fund_pax_tx: "0xcc2e9f8ecbb0193d99862497ca2133f0b74a4474ba3fa0e388cb8a62a1dfd1de"
                fund_usdl_tx: "0xe654c204f0cc52c0529b817507129ecad8bde98cf293615b8083db3929bb7bec"
                created_at: "2026-02-09T23:09:51+00:00"
        "503":
          description: Auth DB not configured
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Phase 3: Charts & History endpoints ────────────────────────────────

  /api/v1/charts/{symbol}:
    get:
      operationId: getAssetChart
      tags: [Asset Charts]
      summary: Get OHLCV price chart for any asset
      description: |
        Returns OHLCV candle data for any supported asset symbol.
        
        **Data sources by symbol:**
        - `PAX` → Price Oracle DB (`pax_candles` table, normalized price ~$10.85)
        - Crypto (BTC, ETH, SOL, etc.) → Candles B, fallback to Candles A `component_candles`
        - Stocks/Commodities (NVDA, TSLA, GOOGL, NAS100, SPX500, XAU) → Candles B
        
        **Available timeframes:** 1m, 2m, 3m, 5m, 15m, 30m, 1h, 4h, 8h, 1D, 1W
      parameters:
        - name: symbol
          in: path
          required: true
          description: Asset symbol (case-insensitive)
          schema:
            type: string
          examples:
            pax:
              value: PAX
              summary: PAX index price
            btc:
              value: BTC
              summary: Bitcoin
            nvda:
              value: NVDA
              summary: NVIDIA stock
        - name: timeframe
          in: query
          description: Candle timeframe
          schema:
            type: string
            enum: [1m, 2m, 3m, 5m, 15m, 30m, 1h, 4h, 8h, 1D, 1W]
            default: "1h"
        - name: limit
          in: query
          description: Maximum candles to return (max 1000)
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: Candle chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetChartResponse"
              example:
                symbol: BTC
                timeframe: 1h
                count: 3
                candles:
                  - symbol: BTC
                    timeframe: 1h
                    timestamp: "2026-02-19T01:00:00+00:00"
                    open: "66415.33"
                    high: "66846.83"
                    low: "66415.13"
                    close: "66836.51"
                    volume: "0"
        "503":
          description: Candles DB not configured
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/trending:
    get:
      operationId: getTrending
      tags: [DEX]
      summary: Get trending launchpad tokens
      description: |
        Returns trending tokens from the DEX, ranked by a composite trending score
        (volume velocity, price momentum, trade intensity, holder growth, freshness).
        Includes price changes, market cap, holder count, and trending category.
      parameters:
        - name: limit
          in: query
          description: Maximum tokens to return (max 100)
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Trending tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingResponse"
              example:
                count: 1
                tokens:
                  - market_id: "0x027276e837144f88ff0fd3feca0f74b666265005"
                    name: Help Me Im Poor
                    symbol: POOR
                    token_address: "0x20b10dc04cc4573c8a2b26cc584fcafd999a42e4"
                    spot_price: "0.000050325699502445"
                    market_cap: "50325.699502445"
                    volume_24h: "500.0"
                    price_change_1h: "0.8917"
                    price_change_24h: "4.579"
                    price_change_7d: "0"
                    holder_count: 3
                    swap_count: 6
                    trending_score: 0.897
                    trending_rank: 1
                    trending_category: hot
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/{address}/dex-history:
    get:
      operationId: getDexHistory
      tags: [DEX]
      summary: Get DEX swap history for a wallet
      description: |
        Returns DEX swap transaction history for a wallet address.
        Each swap includes market info, amounts, price, fees, and side (BUY/SELL).
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: limit
          in: query
          description: Maximum results (max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: DEX swap history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DexHistoryResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Phase 4: AMM Subgraph endpoints ──────────────────────────────────

  /api/v1/amm/tokens/{address}:
    get:
      operationId: getAmmToken
      tags: [AMM]
      summary: Get AMM token by address
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: AMM token data
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Token not found
        "503":
          description: AMM DB not configured

  /api/v1/amm/pairs:
    get:
      operationId: listAmmPairs
      tags: [AMM]
      summary: List AMM pairs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: order_by
          in: query
          schema: { type: string, enum: [volume, swaps, created, liquidity] }
      responses:
        "200":
          description: Paginated pair list
          content:
            application/json:
              schema:
                type: object

  /api/v1/amm/pairs/count:
    get:
      operationId: getAmmPairCount
      tags: [AMM]
      summary: Get total AMM pair count
      responses:
        "200":
          description: Pair count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /api/v1/amm/pairs/search:
    get:
      operationId: getAmmPairByTokens
      tags: [AMM]
      summary: Search AMM pair by token addresses
      parameters:
        - name: token0
          in: query
          required: true
          schema: { type: string }
        - name: token1
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Matching pair
          content:
            application/json:
              schema:
                type: object

  /api/v1/amm/pairs/{address}:
    get:
      operationId: getAmmPair
      tags: [AMM]
      summary: Get AMM pair by address
      parameters:
