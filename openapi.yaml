components:
  parameters:
    WalletAddress:
      name: address
      in: path
      required: true
      description: Wallet address (with or without 0x prefix, case-insensitive)
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      example: "0xf263aB36de550bDa08b52d43eB253b3C0387e2bc"

    TokenAddress:
      name: address
      in: path
      required: true
      description: Token contract address
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      example: "0x6c326079541b0239084803362145896889753177"

    ChartPeriod:
      name: period
      in: query
      description: Time period for chart data
      schema:
        type: string
        enum: ["1d", "7d", "30d", "90d", "1y"]
        default: "30d"

  responses:
    InternalError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          description: Service status
          example: ok
        version:
          type: string
          description: Service version (from Cargo.toml)
          example: "0.1.0"

    TokenSummary:
      type: object
      properties:
        total:
          type: integer
          description: Total tracked tokens
        complete_basic:
          type: integer
          description: Tokens with complete basic metadata
        with_icon:
          type: integer
          description: Tokens with icon URLs
        with_price:
          type: integer
          description: Tokens with current price data
        erc20_count:
          type: integer
          description: Number of ERC-20 tokens
        erc721_count:
          type: integer
          description: Number of ERC-721 NFT collections

    TokenAuditReport:
      type: object
      properties:
        total:
          type: integer
        complete_basic:
          type: integer
        with_icon:
          type: integer
        with_price:
          type: integer
        verified:
          type: integer
        by_type:
          type: object
          properties:
            erc20:
              type: integer
            erc721:
              type: integer
            erc1155:
              type: integer
        needing_enrichment_count:
          type: integer
        needing_enrichment_sample:
          type: array
          items:
            type: object
            properties:
              address:
                type: string
              symbol:
                type: string
              missing_icon:
                type: boolean
              missing_price:
                type: boolean
              missing_decimals:
                type: boolean

    TokenSyncReport:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        complete:
          type: integer
        partial:
          type: integer
        missing:
          type: integer
        with_icon:
          type: integer

    PriceSyncReport:
      type: object
      properties:
        success:
          type: boolean
        total_tokens:
          type: integer
        updated:
          type: integer
        by_source:
          type: object
          properties:
            network:
              type: integer
              description: Prices from DEX Subgraph DB
            stablecoin:
              type: integer
              description: Fixed stablecoin prices
        native_pax_price:
          type: string
          description: Current PAX native price in USD

    TokenMetadata:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
          nullable: true
        symbol:
          type: string
          nullable: true
        decimals:
          type: integer
          nullable: true
        token_type:
          type: string
        total_supply:
          type: string
          nullable: true
        holder_count:
          type: integer
          nullable: true
        fiat_value:
          type: string
          nullable: true
        volume_24h:
          type: string
          nullable: true
        circulating_market_cap:
          type: string
          nullable: true
        icon_url:
          type: string
          nullable: true
        is_verified:
          type: boolean
          nullable: true
        price_usd:
          type: string
          nullable: true
        price_source:
          type: string
          nullable: true
        price_updated_at:
          type: string
          nullable: true

    Portfolio:
      type: object
      required: [address, native_balance, token_holdings, token_count, transaction_count, transfer_count, computed_at]
      properties:
        address:
          type: string
          description: Normalized wallet address
        native_balance:
          $ref: "#/components/schemas/NativeBalance"
        token_holdings:
          type: array
          items:
            $ref: "#/components/schemas/TokenHolding"
        total_value_usd:
          type: string
          nullable: true
          description: Total portfolio value in USD (string-encoded decimal)
        token_count:
          type: integer
          description: Number of unique tokens held
        transaction_count:
          type: integer
          description: Total transaction count for this address
        transfer_count:
          type: integer
          description: Total token transfer count
        perps:
          $ref: "#/components/schemas/PerpsPortfolioSummary"
        exchange_balance_usd:
          type: string
          nullable: true
          description: Off-chain exchange balance value in USD
        computed_at:
          type: string
          format: date-time
          description: When this portfolio was computed

    NativeBalance:
      type: object
      required: [symbol, balance_raw, balance]
      properties:
        symbol:
          type: string
          example: PAX
        balance_raw:
          type: string
          description: Balance in wei
        balance:
          type: string
          description: Human-readable balance
        price_usd:
          type: string
          nullable: true
          description: Current PAX price in USD
        value_usd:
          type: string
          nullable: true
          description: Total USD value of native balance

    TokenHolding:
      type: object
      required: [contract_address, decimals, balance_raw, balance]
      properties:
        contract_address:
          type: string
        symbol:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        decimals:
          type: integer
        balance_raw:
          type: string
          description: Raw balance before decimal adjustment
        balance:
          type: string
          description: Human-readable balance
        price_usd:
          type: string
          nullable: true
        value_usd:
          type: string
          nullable: true
        icon_url:
          type: string
          nullable: true

    EnrichedTransaction:
      type: object
      required: [hash, block_number, timestamp, from_address, value_raw, value, gas_used, gas_price, gas_fee, status, tx_type, token_transfers]
      properties:
        hash:
          type: string
          description: Transaction hash
        block_number:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        from_address:
          type: string
        to_address:
          type: string
          nullable: true
        value_raw:
          type: string
          description: Native value in wei
        value:
          type: string
          description: Human-readable native value
        value_usd:
          type: string
          nullable: true
        gas_used:
          type: string
        gas_price:
          type: string
        gas_fee:
          type: string
          description: Gas fee in native token
        gas_fee_usd:
          type: string
          nullable: true
        status:
          type: boolean
        tx_type:
          type: string
          enum: [transfer, token_transfer, nft_transfer, swap, add_liquidity, remove_liquidity, stake, unstake, claim_rewards, contract_deploy, contract_call, approval, bridge, unknown]
        description:
          type: string
          nullable: true
        token_transfers:
          type: array
          items:
            $ref: "#/components/schemas/EnrichedTokenTransfer"

    EnrichedTokenTransfer:
      type: object
      properties:
        token_address:
          type: string
        token_symbol:
          type: string
          nullable: true
        token_name:
          type: string
          nullable: true
        token_decimals:
          type: integer
          nullable: true
        from_address:
          type: string
        to_address:
          type: string
        amount_raw:
          type: string
        amount:
          type: string
        value_usd:
          type: string
          nullable: true
        token_type:
          type: string
          enum: [ERC-20, ERC-721, ERC-1155]
        token_id:
          type: string
          nullable: true
        log_index:
          type: integer

    BalanceResponse:
      type: object
      required: [address, native_balance_usd, token_balance_usd, perps_value_usd, total_balance_usd, native_balance, token_count, computed_at]
      properties:
        address:
          type: string
        native_balance_usd:
          type: string
          description: Native balance value in USD (2 DP)
        token_balance_usd:
          type: string
          description: Total token holdings value in USD (2 DP)
        perps_value_usd:
          type: string
          description: Perps portfolio value in USD (2 DP)
        total_balance_usd:
          type: string
          description: Total portfolio value (native + tokens + perps)
        native_balance:
          type: string
          description: Native PAX balance (8 DP)
        token_count:
          type: integer
        daily_pnl_usd:
          type: string
          nullable: true
          description: Change since yesterday in USD
        daily_pnl_percent:
          type: string
          nullable: true
          description: Percentage change since yesterday
        computed_at:
          type: string
          format: date-time

    PnlHistoryResponse:
      type: object
      required: [address, days_requested, history]
      properties:
        address:
          type: string
        days_requested:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/PnlHistoryItem"

    PnlHistoryItem:
      type: object
      required: [date, total_value_usd, native_value_usd, token_value_usd, pnl_usd, pnl_percent]
      properties:
        date:
          type: string
          format: date
        total_value_usd:
          type: string
        native_value_usd:
          type: string
        token_value_usd:
          type: string
        pnl_usd:
          type: string
          description: Daily change in USD
        pnl_percent:
          type: string
          description: Daily change as percentage

    ChartResponse:
      type: object
      required: [address, chart_type, period, data]
      properties:
        address:
          type: string
        chart_type:
          type: string
          enum: [portfolio_value, pnl, holdings_count, tx_volume]
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"

    ChartDataPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
          format: date
          description: ISO date string (YYYY-MM-DD)
        value:
          type: string
          description: Numeric value as string (2 DP for USD)

    PerpsPortfolioSummary:
      type: object
      required: [has_vault, open_positions, total_collateral_usd, total_unrealized_pnl, total_perps_value_usd, total_realized_pnl]
      properties:
        has_vault:
          type: boolean
          description: Whether the user has created a perps vault
        vault_address:
          type: string
          nullable: true
          description: Vault contract address
        open_positions:
          type: array
          items:
            $ref: "#/components/schemas/PerpsPosition"
        total_collateral_usd:
          type: string
          description: Total collateral locked in open positions
        total_unrealized_pnl:
          type: string
          description: Total unrealized PnL across open positions
        total_perps_value_usd:
          type: string
          description: Collateral + unrealized PnL
        total_realized_pnl:
          type: string
          description: Lifetime realized PnL
        stats:
          $ref: "#/components/schemas/PerpsUserStats"

    PerpsPosition:
      type: object
      required: [position_id, user_address, market_id, is_long, size_usd, leverage, entry_price, collateral_amount, collateral_usd, status]
      properties:
        position_id:
          type: string
        user_address:
          type: string
        market_id:
          type: integer
        market_name:
          type: string
          nullable: true
        market_symbol:
          type: string
          nullable: true
        is_long:
          type: boolean
        size_usd:
          type: string
        leverage:
          type: string
        entry_price:
          type: string
        current_price:
          type: string
          nullable: true
        collateral_amount:
          type: string
        collateral_usd:
          type: string
        unrealized_pnl:
          type: string
          nullable: true
        realized_pnl:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, closed, liquidated]
        opened_at:
          type: string
          nullable: true
        closed_at:
          type: string
          nullable: true
        open_tx_hash:
          type: string
          nullable: true

    PerpsUserStats:
      type: object
      required: [user_address, total_positions, open_positions, closed_positions, liquidated_positions, total_trades, total_realized_pnl, total_orders, active_orders]
      properties:
        user_address:
          type: string
        total_positions:
          type: integer
        open_positions:
          type: integer
        closed_positions:
          type: integer
        liquidated_positions:
          type: integer
        total_trades:
          type: integer
        total_realized_pnl:
          type: string
        total_orders:
          type: integer
        active_orders:
          type: integer

    PerpsTrade:
      type: object
      required: [id, position_id, user_address, market_id, trade_type, size_usd, price, block_number, tx_hash]
      properties:
        id:
          type: integer
        position_id:
          type: string
        user_address:
          type: string
        market_id:
          type: integer
        trade_type:
          type: string
          enum: [open, close, liquidate, increase, decrease]
        is_long:
          type: boolean
          nullable: true
        size_usd:
          type: string
        price:
          type: string
        realized_pnl:
          type: string
          nullable: true
        fee_usd:
          type: string
          nullable: true
        block_number:
          type: integer
          format: int64
        tx_hash:
          type: string
        block_timestamp:
          type: string
          nullable: true

    # ── Phase 2: Enrichment schemas ────────────────────────────────────

    UserRank:
      type: object
      properties:
        address:
          type: string
          description: Wallet address
        total_score:
          type: number
          format: double
          description: Combined centurion score
        performance_score:
          type: number
          format: double
          description: Trading performance component
        risk_score:
          type: number
          format: double
          description: Risk management component
        behavioral_score:
          type: number
          format: double
          description: Behavioral analysis component
        rank:
          type: string
          description: Coliseum rank tier
          enum: [PLEBEIAN, LEGIONARY, CENTURION, PRAETORIAN, IMPERATOR]
        percentile:
          type: number
          format: double
          description: Percentile rank (0-100)
        leaderboard_position:
          type: integer
          nullable: true
          description: Absolute position on leaderboard (1-based)
        season_id:
          type: string
          description: Current season UUID
        calculated_at:
          type: string
          description: When the score was last calculated
        is_qualified:
          type: boolean
          description: Whether user is qualified for the current season

    UserPerformance:
      type: object
      properties:
        address:
          type: string
        season_id:
          type: string
        roi:
          type: number
          format: double
          description: Return on investment (absolute)
        roi_percent:
          type: number
          format: double
          description: ROI as percentage
        sharpe_ratio:
          type: number
          format: double
          description: Risk-adjusted return metric
        win_rate:
          type: number
          format: double
          description: Percentage of winning trades (0-1)
        total_trades:
          type: integer
        winning_trades:
          type: integer
        losing_trades:
          type: integer
        avg_win_size:
          type: number
          format: double
        avg_loss_size:
          type: number
          format: double
        profit_factor:
          type: number
          format: double
          description: Gross profit / gross loss ratio
        total_pnl:
          type: string
          description: Total PnL (string-encoded decimal for precision)
        calculated_at:
          type: string
        behavioral:
          type: object
          nullable: true
          description: Trading behavioral analysis
          properties:
            position_sizing_consistency:
              type: number
              format: double
            diversification_score:
              type: number
              format: double
            gas_efficiency:
              type: number
              format: double
            trading_frequency:
              type: number
              format: double
            hold_duration_avg:
              type: number
              format: double
            protocol_usage_count:
              type: integer
            unique_tokens_traded:
              type: integer
            avg_time_between_trades:
              type: number
              format: double

    UserProfile:
      type: object
      properties:
        address:
          type: string
          description: Wallet address
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        funded:
          type: boolean
          description: Whether account has been funded
        fund_status:
          type: string
          description: Funding status
          enum: [pending, funded, unknown]
        fund_pax_tx:
          type: string
          nullable: true
          description: PAX funding transaction hash
        fund_usdl_tx:
          type: string
          nullable: true
          description: USDL funding transaction hash
        created_at:
          type: string
          format: date-time
          nullable: true

    # ── Phase 3: Charts & History schemas ──────────────────────────────

    AssetChartResponse:
      type: object
      required: [symbol, timeframe, count, candles]
      properties:
        symbol:
          type: string
          description: Asset symbol (uppercase)
        timeframe:
          type: string
          description: Candle timeframe
        count:
          type: integer
          description: Number of candles returned
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"

    Candle:
      type: object
      required: [symbol, timeframe, timestamp, open, high, low, close]
      properties:
        symbol:
          type: string
        timeframe:
          type: string
        timestamp:
          type: string
          format: date-time
          description: Candle open time (ISO 8601)
        open:
          type: string
          description: Open price (string-encoded decimal)
        high:
          type: string
          description: High price
        low:
          type: string
          description: Low price
        close:
          type: string
          description: Close price
        volume:
          type: string
          nullable: true
          description: Volume

    TrendingResponse:
      type: object
      required: [count, tokens]
      properties:
        count:
          type: integer
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/TrendingToken"

    TrendingToken:
      type: object
      properties:
        market_id:
          type: string
          description: DEX market contract address
        name:
          type: string
          description: Token name
        symbol:
          type: string
          description: Token symbol
        token_address:
          type: string
          description: Token contract address
        spot_price:
          type: string
          description: Current spot price in USD
        market_cap:
          type: string
          description: Market cap in USID
        volume_24h:
          type: string
          description: 24h trading volume in USID
        price_change_1h:
          type: string
          description: 1-hour price change percentage
        price_change_24h:
          type: string
          description: 24-hour price change percentage
        price_change_7d:
          type: string
          description: 7-day price change percentage
        holder_count:
          type: integer
          format: int64
        swap_count:
          type: integer
          format: int64
        trending_score:
          type: number
          format: double
          description: Composite trending score (0-1)
        trending_rank:
          type: integer
          description: Rank position (1-based)
        trending_category:
          type: string
          description: Trending category
          enum: [hot, warm, cold]

    DexHistoryResponse:
      type: object
      required: [address, count, swaps]
      properties:
        address:
          type: string
        count:
          type: integer
        swaps:
          type: array
          items:
            $ref: "#/components/schemas/DexSwap"

    DexSwap:
      type: object
      properties:
        id:
          type: string
          description: Swap event ID
        market_name:
          type: string
          description: Market name
        market_symbol:
          type: string
          description: Market symbol
        tx_hash:
          type: string
          description: Transaction hash
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp
        token_in:
          type: string
          description: Input token address
        token_out:
          type: string
          description: Output token address
        amount_in:
          type: string
          description: Input amount (string-encoded)
        amount_out:
          type: string
          description: Output amount (string-encoded)
        amount_in_usid:
          type: string
          description: Input amount in USID terms
        spot_price:
          type: string
          description: Spot price at time of swap
        fee_usid:
          type: string
          description: Fee paid in USID
        price_impact:
          type: string
          description: Price impact of the swap
        side:
          type: string
          description: Trade direction
          enum: [BUY, SELL]
