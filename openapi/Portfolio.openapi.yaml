openapi: 3.1.0
info:
  title: Paxeer Portfolio API
  version: 0.1.0
  description: |
    Complete REST API for the Paxeer Portfolio Service.
    Provides wallet portfolio tracking, token metadata, perpetuals positions,
    PnL analytics, and chart data for the Paxeer Network.
  contact:
    name: Paxeer Team
  license:
    name: MIT

servers:
  - url: https://us-east-1.user-stats.sidiora.exchange
    description: Production

tags:
  - name: Health
    description: Service health and status
  - name: Tokens
    description: Token metadata and sync operations
  - name: Prices
    description: Token price sync operations
  - name: Portfolio
    description: Wallet portfolio data
  - name: PnL
    description: Profit & Loss and balance tracking
  - name: Charts
    description: Time-series chart data
  - name: Perps
    description: Perpetuals trading positions and trades

paths:
  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Service health check
      description: Returns service status and version. Use for uptime monitoring and readiness probes.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                version: "0.1.0"

  /api/v1/tokens:
    get:
      operationId: listTokens
      tags: [Tokens]
      summary: List all tokens (summary)
      description: Returns a summary of all tracked tokens with metadata completeness stats.
      responses:
        "200":
          description: Token summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSummary"
              example:
                total: 203
                complete_basic: 192
                with_icon: 68
                with_price: 90
                erc20_count: 197
                erc721_count: 6
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/tokens/audit:
    get:
      operationId: auditTokens
      tags: [Tokens]
      summary: Audit token metadata completeness
      description: |
        Returns detailed audit of token metadata quality including counts by type,
        completeness metrics, and a sample of tokens needing enrichment.
      responses:
        "200":
          description: Token audit report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenAuditReport"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/tokens/sync:
    post:
      operationId: syncTokens
      tags: [Tokens]
      summary: Trigger token metadata sync from Paxscan
      description: |
        Manually triggers a full sync of token metadata from the Paxscan block explorer database.
        This runs automatically every 5 minutes but can be triggered on-demand.
      responses:
        "200":
          description: Sync completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSyncReport"
              example:
                success: true
                total: 203
                complete: 192
                partial: 11
                missing: 0
                with_icon: 68
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/tokens/{address}:
    get:
      operationId: getToken
      tags: [Tokens]
      summary: Get single token metadata
      description: Returns metadata for a specific token by its contract address.
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
      responses:
        "200":
          description: Token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/prices/sync:
    post:
      operationId: syncPrices
      tags: [Prices]
      summary: Trigger price sync from all DB sources
      description: |
        Manually triggers a full price sync from:
        - **Price Oracle DB**: PAX native price (candle close)
        - **DEX Subgraph DB**: All DEX market spot prices
        - **Hardcoded**: Stablecoin prices fixed at $1.00
        
        Prices are stored in the Portfolio DB and used for portfolio valuations.
        This runs automatically every 30 seconds.
      responses:
        "200":
          description: Price sync completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSyncReport"
              example:
                success: true
                total_tokens: 90
                updated: 90
                by_source:
                  network: 86
                  stablecoin: 4
                native_pax_price: "10.8558331254187000"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}:
    get:
      operationId: getPortfolio
      tags: [Portfolio]
      summary: Get full portfolio for a wallet
      description: |
        Returns the complete portfolio for a wallet address including:
        - Native PAX balance with USD value
        - All ERC-20 token holdings with prices
        - Perpetuals portfolio summary (vault, positions, PnL)
        - Total portfolio value in USD
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Complete portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/holdings:
    get:
      operationId: getHoldings
      tags: [Portfolio]
      summary: Get token holdings for a wallet
      description: Returns all ERC-20 token holdings with balances, prices, and USD values.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Token holdings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenHolding"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/transactions:
    get:
      operationId: getTransactions
      tags: [Portfolio]
      summary: Get transactions for a wallet
      description: |
        Returns enriched transaction history with type classification,
        token transfer details, gas costs, and USD values. Supports pagination.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: limit
          in: query
          description: Maximum number of transactions to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of transactions to skip for pagination
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrichedTransaction"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/balance:
    get:
      operationId: getBalance
      tags: [PnL]
      summary: Get total balance with daily PnL
      description: |
        Returns the current total portfolio balance broken down by native, tokens,
        and perps, plus the daily PnL compared to yesterday's snapshot.
        Also saves a daily snapshot for historical tracking.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Balance with PnL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/pnl:
    get:
      operationId: getPnlHistory
      tags: [PnL]
      summary: Get PnL history
      description: |
        Returns daily PnL history showing portfolio value changes over time.
        Each entry includes total value, component breakdown, and daily change.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: days
          in: query
          description: Number of days of history (max 365)
          schema:
            type: integer
            default: 30
            maximum: 365
      responses:
        "200":
          description: PnL history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlHistoryResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/value:
    get:
      operationId: getPortfolioValueChart
      tags: [Charts]
      summary: Portfolio value chart
      description: |
        Returns time-series data for portfolio total value.
        Uses high-frequency snapshots (5min intervals) when available, falls back to daily.
        
        **Granularity by period:**
        - `1d` → every 5 min
        - `7d` → every 1 hour
        - `30d` → every 4 hours
        - `90d` → every day
        - `1y` → every day
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/pnl:
    get:
      operationId: getPnlChart
      tags: [Charts]
      summary: PnL chart
      description: Returns time-series PnL data (change between consecutive snapshots).
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/holdings:
    get:
      operationId: getHoldingsChart
      tags: [Charts]
      summary: Holdings count chart
      description: Returns time-series data for the number of unique tokens held.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/charts/tx-volume:
    get:
      operationId: getTxVolumeChart
      tags: [Charts]
      summary: Transaction volume chart
      description: Returns time-series data for transaction volume in USD.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/ChartPeriod"
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/perps:
    get:
      operationId: getPerpsPortfolio
      tags: [Perps]
      summary: Get perps portfolio summary
      description: |
        Returns the complete perpetuals portfolio for a user including:
        - Vault status and address
        - All open positions with unrealized PnL
        - Total collateral, unrealized/realized PnL
        - Aggregated user stats (position counts, trade counts, orders)
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
      responses:
        "200":
          description: Perps portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerpsPortfolioSummary"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/perps/positions:
    get:
      operationId: getPerpsPositions
      tags: [Perps]
      summary: Get perps positions
      description: |
        Returns perpetuals positions for a user. Can filter by status and paginate.
        Each position includes market info, entry/current price, leverage, and PnL.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: status
          in: query
          description: Filter by position status
          schema:
            type: string
            enum: [open, closed, liquidated]
        - name: limit
          in: query
          description: Maximum results (max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Positions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerpsPosition"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/portfolio/{address}/perps/trades:
    get:
      operationId: getPerPsTrades
      tags: [Perps]
      summary: Get perps trade history
      description: Returns perpetuals trade history for a user with pagination.
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: limit
          in: query
          description: Maximum results (max 100)
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerpsTrade"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    WalletAddress:
      name: address
      in: path
      required: true
      description: Wallet address (with or without 0x prefix, case-insensitive)
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      example: "0xf263aB36de550bDa08b52d43eB253b3C0387e2bc"

    TokenAddress:
      name: address
      in: path
      required: true
      description: Token contract address
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      example: "0x6c326079541b0239084803362145896889753177"

    ChartPeriod:
      name: period
      in: query
      description: Time period for chart data
      schema:
        type: string
        enum: ["1d", "7d", "30d", "90d", "1y"]
        default: "30d"

  responses:
    InternalError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          description: Service status
          example: ok
        version:
          type: string
          description: Service version (from Cargo.toml)
          example: "0.1.0"

    TokenSummary:
      type: object
      properties:
        total:
          type: integer
          description: Total tracked tokens
        complete_basic:
          type: integer
          description: Tokens with complete basic metadata
        with_icon:
          type: integer
          description: Tokens with icon URLs
        with_price:
          type: integer
          description: Tokens with current price data
        erc20_count:
          type: integer
          description: Number of ERC-20 tokens
        erc721_count:
          type: integer
          description: Number of ERC-721 NFT collections

    TokenAuditReport:
      type: object
      properties:
        total:
          type: integer
        complete_basic:
          type: integer
        with_icon:
          type: integer
        with_price:
          type: integer
        verified:
          type: integer
        by_type:
          type: object
          properties:
            erc20:
              type: integer
            erc721:
              type: integer
            erc1155:
              type: integer
        needing_enrichment_count:
          type: integer
        needing_enrichment_sample:
          type: array
          items:
            type: object
            properties:
              address:
                type: string
              symbol:
                type: string
              missing_icon:
                type: boolean
              missing_price:
                type: boolean
              missing_decimals:
                type: boolean

    TokenSyncReport:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        complete:
          type: integer
        partial:
          type: integer
        missing:
          type: integer
        with_icon:
          type: integer

    PriceSyncReport:
      type: object
      properties:
        success:
          type: boolean
        total_tokens:
          type: integer
        updated:
          type: integer
        by_source:
          type: object
          properties:
            network:
              type: integer
              description: Prices from DEX Subgraph DB
            stablecoin:
              type: integer
              description: Fixed stablecoin prices
        native_pax_price:
          type: string
          description: Current PAX native price in USD

    TokenMetadata:
      type: object
      properties:
        address:
          type: string
        message:
          type: string
          description: Placeholder — endpoint not yet fully implemented

    Portfolio:
      type: object
      required: [address, native_balance, token_holdings, token_count, transaction_count, transfer_count, computed_at]
      properties:
        address:
          type: string
          description: Normalized wallet address
        native_balance:
          $ref: "#/components/schemas/NativeBalance"
        token_holdings:
          type: array
          items:
            $ref: "#/components/schemas/TokenHolding"
        total_value_usd:
          type: string
          nullable: true
          description: Total portfolio value in USD (string-encoded decimal)
        token_count:
          type: integer
          description: Number of unique tokens held
        transaction_count:
          type: integer
          description: Total transaction count for this address
        transfer_count:
          type: integer
          description: Total token transfer count
        perps:
          $ref: "#/components/schemas/PerpsPortfolioSummary"
        computed_at:
          type: string
          format: date-time
          description: When this portfolio was computed

    NativeBalance:
      type: object
      required: [symbol, balance_raw, balance]
      properties:
        symbol:
          type: string
          example: PAX
        balance_raw:
          type: string
          description: Balance in wei
        balance:
          type: string
          description: Human-readable balance
        price_usd:
          type: string
          nullable: true
          description: Current PAX price in USD
        value_usd:
          type: string
          nullable: true
          description: Total USD value of native balance

    TokenHolding:
      type: object
      required: [contract_address, decimals, balance_raw, balance]
      properties:
        contract_address:
          type: string
        symbol:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        decimals:
          type: integer
        balance_raw:
          type: string
          description: Raw balance before decimal adjustment
        balance:
          type: string
          description: Human-readable balance
        price_usd:
          type: string
          nullable: true
        value_usd:
          type: string
          nullable: true
        icon_url:
          type: string
          nullable: true

    EnrichedTransaction:
      type: object
      required: [hash, block_number, timestamp, from_address, value_raw, value, gas_used, gas_price, gas_fee, status, tx_type, token_transfers]
      properties:
        hash:
          type: string
          description: Transaction hash
        block_number:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        from_address:
          type: string
        to_address:
          type: string
          nullable: true
        value_raw:
          type: string
          description: Native value in wei
        value:
          type: string
          description: Human-readable native value
        value_usd:
          type: string
          nullable: true
        gas_used:
          type: string
        gas_price:
          type: string
        gas_fee:
          type: string
          description: Gas fee in native token
        gas_fee_usd:
          type: string
          nullable: true
        status:
          type: boolean
        tx_type:
          type: string
          enum: [transfer, token_transfer, nft_transfer, swap, add_liquidity, remove_liquidity, stake, unstake, claim_rewards, contract_deploy, contract_call, approval, bridge, unknown]
        description:
          type: string
          nullable: true
        token_transfers:
          type: array
          items:
            $ref: "#/components/schemas/EnrichedTokenTransfer"

    EnrichedTokenTransfer:
      type: object
      properties:
        token_address:
          type: string
        token_symbol:
          type: string
          nullable: true
        token_name:
          type: string
          nullable: true
        token_decimals:
          type: integer
          nullable: true
        from_address:
          type: string
        to_address:
          type: string
        amount_raw:
          type: string
        amount:
          type: string
        value_usd:
          type: string
          nullable: true
        token_type:
          type: string
          enum: [ERC-20, ERC-721, ERC-1155]
        token_id:
          type: string
          nullable: true
        log_index:
          type: integer

    BalanceResponse:
      type: object
      required: [address, native_balance_usd, token_balance_usd, perps_value_usd, total_balance_usd, native_balance, token_count, computed_at]
      properties:
        address:
          type: string
        native_balance_usd:
          type: string
          description: Native balance value in USD (2 DP)
        token_balance_usd:
          type: string
          description: Total token holdings value in USD (2 DP)
        perps_value_usd:
          type: string
          description: Perps portfolio value in USD (2 DP)
        total_balance_usd:
          type: string
          description: Total portfolio value (native + tokens + perps)
        native_balance:
          type: string
          description: Native PAX balance (8 DP)
        token_count:
          type: integer
        daily_pnl_usd:
          type: string
          nullable: true
          description: Change since yesterday in USD
        daily_pnl_percent:
          type: string
          nullable: true
          description: Percentage change since yesterday
        computed_at:
          type: string
          format: date-time

    PnlHistoryResponse:
      type: object
      required: [address, days_requested, history]
      properties:
        address:
          type: string
        days_requested:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/PnlHistoryItem"

    PnlHistoryItem:
      type: object
      required: [date, total_value_usd, native_value_usd, token_value_usd, pnl_usd, pnl_percent]
      properties:
        date:
          type: string
          format: date
        total_value_usd:
          type: string
        native_value_usd:
          type: string
        token_value_usd:
          type: string
        pnl_usd:
          type: string
          description: Daily change in USD
        pnl_percent:
          type: string
          description: Daily change as percentage

    ChartResponse:
      type: object
      required: [address, chart_type, period, data]
      properties:
        address:
          type: string
        chart_type:
          type: string
          enum: [portfolio_value, pnl, holdings_count, tx_volume]
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"

    ChartDataPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
          format: date
          description: ISO date string (YYYY-MM-DD)
        value:
          type: string
          description: Numeric value as string (2 DP for USD)

    PerpsPortfolioSummary:
      type: object
      required: [has_vault, open_positions, total_collateral_usd, total_unrealized_pnl, total_perps_value_usd, total_realized_pnl]
      properties:
        has_vault:
          type: boolean
          description: Whether the user has created a perps vault
        vault_address:
          type: string
          nullable: true
          description: Vault contract address
        open_positions:
          type: array
          items:
            $ref: "#/components/schemas/PerpsPosition"
        total_collateral_usd:
          type: string
          description: Total collateral locked in open positions
        total_unrealized_pnl:
          type: string
          description: Total unrealized PnL across open positions
        total_perps_value_usd:
          type: string
          description: Collateral + unrealized PnL
        total_realized_pnl:
          type: string
          description: Lifetime realized PnL
        stats:
          $ref: "#/components/schemas/PerpsUserStats"

    PerpsPosition:
      type: object
      required: [position_id, user_address, market_id, is_long, size_usd, leverage, entry_price, collateral_amount, collateral_usd, status]
      properties:
        position_id:
          type: string
        user_address:
          type: string
        market_id:
          type: integer
        market_name:
          type: string
          nullable: true
        market_symbol:
          type: string
          nullable: true
        is_long:
          type: boolean
        size_usd:
          type: string
        leverage:
          type: string
        entry_price:
          type: string
        current_price:
          type: string
          nullable: true
        collateral_amount:
          type: string
        collateral_usd:
          type: string
        unrealized_pnl:
          type: string
          nullable: true
        realized_pnl:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, closed, liquidated]
        opened_at:
          type: string
          nullable: true
        closed_at:
          type: string
          nullable: true
        open_tx_hash:
          type: string
          nullable: true

    PerpsUserStats:
      type: object
      required: [user_address, total_positions, open_positions, closed_positions, liquidated_positions, total_trades, total_realized_pnl, total_orders, active_orders]
      properties:
        user_address:
          type: string
        total_positions:
